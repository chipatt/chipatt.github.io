    <header>
        <h1>Calculatrice Peinture</h1>
        <p>Calcul de la quantité de peinture nécessaire</p>
    </header>

    <div class="container">
        <div class="main-grid">
            <div class="content">
                <div style="text-align:center;margin:20px auto;min-height:90px;max-width:728px;"></div>
                <div class="tool-section">
    <h2>Calculatrice Peinture</h2>
    <p>Estimez la quantité de peinture nécessaire pour votre pièce.</p>

    <label>Longueur (m):</label>
    <input type="number" id="length" placeholder="5" min="0" step="0.1">

    <label>Largeur (m):</label>
    <input type="number" id="width" placeholder="4" min="0" step="0.1">

    <label>Hauteur (m):</label>
    <input type="number" id="height" placeholder="2.5" min="0" step="0.1">

    <label>Rendement peinture (m²/L):</label>
    <input type="number" id="yield" placeholder="12" min="1" step="0.5">

    <button onclick="calcPaint()">Calculer</button>
    <div id="resultPaint" class="result" style="display:none;"></div>
</div>

<script>
function calcPaint() {
    const l = parseFloat(document.getElementById('length').value);
    const w = parseFloat(document.getElementById('width').value);
    const h = parseFloat(document.getElementById('height').value);
    const yield_val = parseFloat(document.getElementById('yield').value);
    const surface = (2 * l * h) + (2 * w * h);
    const liters = surface / yield_val;
    const result = document.getElementById('resultPaint');
    result.innerHTML = '<strong>Surface: ' + surface.toFixed(2) + ' m² | Peinture: ' + liters.toFixed(2) + ' L</strong>';
    result.style.display = 'block';
}
</script>
