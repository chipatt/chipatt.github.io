    <header>
        <h1>Calculatrice Carrelage</h1>
        <p>Quantité de carreaux pour votre sol</p>
    </header>

    <div class="container">
        <div class="main-grid">
            <div class="content">
                <div style="text-align:center;margin:20px auto;min-height:90px;max-width:728px;"></div>
                <div class="tool-section">
    <h2>Calculatrice Carrelage</h2>
    <p>Calculez le nombre de carreaux nécessaires pour votre sol.</p>

    <label>Longueur pièce (m):</label>
    <input type="number" id="room_length" placeholder="6" min="0" step="0.1">

    <label>Largeur pièce (m):</label>
    <input type="number" id="room_width" placeholder="4" min="0" step="0.1">

    <label>Taille carreau (cm):</label>
    <select id="tile_size">
        <option value="30">30x30 cm</option>
        <option value="40">40x40 cm</option>
        <option value="60">60x60 cm</option>
        <option value="20">20x20 cm</option>
    </select>

    <button onclick="calcTiles()">Calculer</button>
    <div id="resultTiles" class="result" style="display:none;"></div>
</div>

<script>
function calcTiles() {
    const l = parseFloat(document.getElementById('room_length').value);
    const w = parseFloat(document.getElementById('room_width').value);
    const size = parseInt(document.getElementById('tile_size').value) / 100;
    const surface = l * w;
    const tile_surface = size * size;
    const qty = Math.ceil(surface / tile_surface);
    const result = document.getElementById('resultTiles');
    result.innerHTML = '<strong>Carreaux nécessaires: ' + qty + ' (+ 10% casse)</strong>';
    result.style.display = 'block';
}
</script>
