    <div class="container">

                <div style="text-align:center;margin:20px auto;min-height:90px;max-width:728px;"></div>
                <div class="tool-section">
    <h2>Calculatrice Volume Déménagement</h2>
    <p>Estimez le volume de camion nécessaire pour votre déménagement.</p>

    <label>Nombre de pièces:</label>
    <select id="rooms">
        <option value="1">Studio</option>
        <option value="2">T2 (2 pièces)</option>
        <option value="3">T3 (3 pièces)</option>
        <option value="4">T4 (4 pièces)</option>
        <option value="5">5+ pièces</option>
    </select>

    <button onclick="calcVolume()">Calculer</button>
    <div id="resultVolume" class="result" style="display:none;"></div>
</div>

<script>
function calcVolume() {
    const rooms = parseInt(document.getElementById('rooms').value);
    const volumes = {'1': '5-10', '2': '10-15', '3': '15-20', '4': '20-30', '5': '30+'};
    const trucks = {'1': 'Petit utilitaire', '2': '7.5 m³', '3': '10 m³', '4': '15 m³', '5': '20+ m³'};
    const result = document.getElementById('resultVolume');
    result.innerHTML = '<strong>Volume estimé: ' + volumes[rooms] + ' m³<br>Véhicule: ' + trucks[rooms] + '</strong>';
    result.style.display = 'block';
}
</script>
