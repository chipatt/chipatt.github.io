    <h2>Calculatrice Indemnité Licenciement</h2>
    <p>Estimez votre indemnité légale en cas de licenciement.</p>

    <label>Salaire mensuel brut (€):</label>
    <input type="number" id="salary" placeholder="2000" min="0" step="100">

    <label>Ancienneté (années):</label>
    <input type="number" id="seniority" placeholder="5" min="0" step="0.5">

    <label>Motif licenciement:</label>
    <select id="reason">
        <option value="personnel">Faute personnelle</option>
        <option value="economique">Raison économique</option>
        <option value="autre">Autre</option>
    </select>

    <button onclick="calcIndemnity()">Calculer</button>
    <div id="resultIndemnity" class="result" style="display:none;"></div>
</div>

<script>
function calcIndemnity() {
    const salary = parseFloat(document.getElementById('salary').value);
    const seniority = parseFloat(document.getElementById('seniority').value);
    const reason = document.getElementById('reason').value;

    let indemnity = 0;
    if (seniority >= 1) {
        indemnity = salary * (1/4) * Math.min(seniority, 10);
        if (seniority > 10) indemnity += salary * (1/3) * (seniority - 10);
    }

    const result = document.getElementById('resultIndemnity');
    result.innerHTML = '<strong>Indemnité estimée: €' + indemnity.toFixed(2) + '<br>⚠️ À titre informatif, consultez un avocat pour confirmation.</strong>';
    result.style.display = 'block';
}
</script>
