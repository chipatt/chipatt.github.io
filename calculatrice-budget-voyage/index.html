    <header>
        <h1>Calculatrice Budget Voyage</h1>
        <p>Estimez le budget total de votre voyage</p>

    <div class="container">
        <div class="main-grid">
            <div class="content">
                <div style="text-align:center;margin:20px auto;min-height:90px;max-width:728px;"></div>
                <div class="tool-section">
    <h2>Calculatrice Budget Voyage</h2>
    <p>Estimez le coût total de votre voyage.</p>

    <label>Destination:</label>
    <select id="destination">
        <option value="10">France</option>
        <option value="15">Espagne</option>
        <option value="20">USA</option>
        <option value="30">Asie</option>
    </select>

    <label>Nombre de jours:</label>
    <input type="number" id="days" placeholder="7" min="1" max="365">

    <label>Budget par jour (€):</label>
    <input type="number" id="daily_budget" placeholder="100" min="0" step="10">

    <button onclick="calcBudget()">Calculer</button>
    <div id="result6" class="result" style="display:none;"></div>
</div>

<script>
function calcBudget() {
    const daily = parseFloat(document.getElementById('daily_budget').value);
    const days = parseInt(document.getElementById('days').value);
    const multiplier = parseInt(document.getElementById('destination').value);
    const total = daily * days * (multiplier / 10);
    const result = document.getElementById('result6');
    result.innerHTML = '<strong>Budget estimé: €' + total.toFixed(2) + '</strong>';
    result.style.display = 'block';
}
</script>
